// ===== v3.6: SUSTAINABILITY CALCULATOR =====
const calculateSustainability = (params) => {
  const {
    consumption = 0,      // C: Daily consumption (R_Stock outflow)
    exportGoods = 0,      // E_g: Goods export (R_Stock outflow)
    exportService = 0,    // E_s: Service export (no R_Stock change)
    importValue = 0,      // I: Import (R_Stock inflow)
    production = 0,       // P: Production gain
    recycling = 0,        // R: Recycling (FREE R_Stock inflow)
    rStock = 0,           // Current R_Stock
    fgFC = 0,             // Current FG-Pool FC
  } = params;

  // Stock Margin: 物資平衡
  const stockMargin = importValue + production + recycling - (consumption + exportGoods);
  
  // FX Margin: 外匯平衡
  const fxMargin = exportService + exportGoods - importValue;
  
  // System Sustainability Margin: 最弱的那條腿
  const sustainabilityMargin = Math.min(stockMargin, fxMargin);
  
  // Is Sustainable?
  const isSustainable = sustainabilityMargin >= 0;
  
  // Days to Collapse (with edge case handling per 6AI feedback)
  let daysToStockCollapse = Infinity;
  let daysTofxCollapse = Infinity;
  
  if (stockMargin < 0) {
    if (rStock <= 0) {
      daysToStockCollapse = 0; // Immediate collapse - no reserves
    } else {
      daysToStockCollapse = rStock / Math.abs(stockMargin);
    }
  }
  
  if (fxMargin < 0) {
    if (fgFC <= 0) {
      daysTofxCollapse = 0; // Immediate collapse - no FX reserves
    } else {
      daysTofxCollapse = fgFC / Math.abs(fxMargin);
    }
  }
  
  const daysToCollapse = Math.min(daysToStockCollapse, daysTofxCollapse);
  
  // Weakest Link
  const weakestLink = stockMargin <= fxMargin ? 'Stock' : 'FX';
  
  // Resource Change Rate (Ṙ)
  const rDot = stockMargin; // dR/dt
  const rDotStatus = rDot > 0 ? 'Growing' : rDot < 0 ? 'Depleting' : 'Stable';
  
  return {
    stockMargin,
    fxMargin,
    sustainabilityMargin,
    isSustainable,
    daysToCollapse: daysToCollapse === Infinity ? '∞' : Math.round(daysToCollapse),
    daysToStockCollapse: daysToStockCollapse === Infinity ? '∞' : Math.round(daysToStockCollapse),
    daysTofxCollapse: daysTofxCollapse === Infinity ? '∞' : Math.round(daysTofxCollapse),
    weakestLink,
    rDot,
    rDotStatus,
  };
};

    let fgPoolTH = params.fgPoolTH || 0;

    let gPool = params.gPoolInitial;
    
    // Day 0 - Initial State (same as normal)
    results.push({
      day: 0,
      dPool, rPoolBank, rPoolStock, fgPoolTH, fgPoolFC, gPool,
      rPoolTotal: rPoolBank + rPoolStock,
      totalTH: dPool + rPoolBank + rPoolStock + fgPoolTH + gPool,
      dPoolIssue: 0, dPoolReturn: 0, dPoolNet: 0,
      rPoolIncome: 0, rPoolImport: 0, rPoolExcess: 0,
      fgPoolImport: 0, fgPoolExport: 0, fgPoolExportTH: 0, fgPoolNet: 0,
      exportAchieved: 0, exportTarget: params.dailyImportFC,
      exportRate: 0,
      alerts: [],
      fgPoolRunway: fgPoolFC / params.dailyImportFC,
      swanActive: false,
    });
    
    for (let day = 1; day <= params.simulationDays; day++) {
      const alerts = [];
      const dayStart = { dPool, rPoolBank, rPoolStock, fgPoolTH, fgPoolFC, gPool };
      
      // Check if Black Swan is active
      const swanActive = day >= swanEvent.startDay && day < swanEvent.startDay + swanEvent.duration;
      const daysIntoSwan = swanActive ? day - swanEvent.startDay : 0;
      
      // Apply Black Swan effects
      let effectiveParams = { ...params };
      if (swanActive) {
        alerts.push(`🦢 Black Swan Active: Day ${daysIntoSwan + 1}/${swanEvent.duration}`);
        
        // Calculate severity (can use S-curve in future)
        let currentSeverity = swanEvent.severity;
        if (swanEvent.recovery === 'linear') {
          // Gradually reduce severity
          currentSeverity = swanEvent.severity * (1 - daysIntoSwan / swanEvent.duration);
        } else if (swanEvent.recovery === 'vshape') {
          // V-shape: worst at middle
          const midpoint = swanEvent.duration / 2;
          if (daysIntoSwan < midpoint) {
            currentSeverity = swanEvent.severity * (daysIntoSwan / midpoint);
          } else {
            currentSeverity = swanEvent.severity * (1 - (daysIntoSwan - midpoint) / midpoint);
          }
        }
        
        // Apply effects based on event type
        switch (swanEvent.type) {
          case 'EXPORT_CRASH':
            effectiveParams.exportEfficiency = params.exportEfficiency * (1 - currentSeverity);
            break;
          case 'IMPORT_SPIKE':
            effectiveParams.dailyImportFC = params.dailyImportFC * (1 + currentSeverity);
            break;
          case 'POPULATION_EXODUS':
            effectiveParams.population = Math.floor(params.population * (1 - currentSeverity));
            break;
          case 'SKILL_DRAIN':
            effectiveParams.exportEfficiency = params.exportEfficiency * (1 - currentSeverity * 0.6);
            break;
          case 'SUPPLY_CHAIN':
            effectiveParams.steadyStateRecyclingRate = params.steadyStateRecyclingRate * (1 - currentSeverity * 0.5);
            break;
          case 'NARRATIVE_COLLAPSE':
            // Affects activity rate - simulate via export efficiency for now
            effectiveParams.exportEfficiency = params.exportEfficiency * (1 - currentSeverity * 0.4);
            break;
          case 'COORDINATION_BREAKDOWN':
            effectiveParams.exportEfficiency = params.exportEfficiency * (1 - currentSeverity * 0.4);
            effectiveParams.steadyStateRecyclingRate = params.steadyStateRecyclingRate * (1 - currentSeverity * 0.3);
            break;
          case 'FX_FREEZE':
            // FG-Pool locked - cannot import
            effectiveParams.fgPoolLocked = true;
            break;
        }
      }
      
      // Phase Auto-Transition (same as normal)
      let currentPhaseKey;
      if (effectiveParams.autoPhaseTransition && effectiveParams.currentPhase === 1) {
        if (day <= 30) currentPhaseKey = '1A';
        else if (day <= 60) currentPhaseKey = '1B';
        else if (day <= 90) currentPhaseKey = '1C';
        else currentPhaseKey = 2;
      } else {
        currentPhaseKey = effectiveParams.currentPhase === 1 && effectiveParams.currentSubPhase 
          ? `${effectiveParams.currentPhase}${effectiveParams.currentSubPhase}` 
          : effectiveParams.currentPhase;
      }
      
      const phaseData = effectiveParams.phases[currentPhaseKey] || effectiveParams.phases['1A'];
      const dayExportPop = Math.floor(effectiveParams.population * phaseData.exportRatio);
      const dayNonExportPop = effectiveParams.population - dayExportPop;
      const dayActivityRate = (dayExportPop * phaseData.exportActivity + dayNonExportPop * phaseData.nonExportActivity) / effectiveParams.population;
      
      // ===== SIMULATION LOGIC (same as normal but with effectiveParams) =====
      const dailyIssue = effectiveParams.population * DAILY_SPENDING;
      dPool -= dailyIssue;
      
      const citizenSpend = dailyIssue * dayActivityRate;
      const citizenReturn = dailyIssue - citizenSpend;
      
      const goodsSpend = citizenSpend * effectiveParams.goodsConsumptionRate;
      const serviceSpend = citizenSpend * effectiveParams.serviceConsumptionRate;
      
      const b2cToRPool = goodsSpend * effectiveParams.b2cToRPoolRate;
      const b2cToB2B = goodsSpend * effectiveParams.b2cToB2BRate;
      const b2cToDPool = goodsSpend * (1 - effectiveParams.b2cToRPoolRate - effectiveParams.b2cToB2BRate);
      
      const b2bToRPool = b2cToB2B * effectiveParams.b2bToRPoolRate;
      const b2bToDPool = b2cToB2B * (1 - effectiveParams.b2bToRPoolRate);
      
      const serviceToDPool = serviceSpend * (1 - effectiveParams.serviceToRPoolRate);
      
      const rPoolIncome = b2cToRPool + b2bToRPool + serviceSpend * effectiveParams.serviceToRPoolRate;
      rPoolBank += rPoolIncome;
      
      // Recycling
      const recycleRate = day <= effectiveParams.recyclingDelay ? 0 : effectiveParams.steadyStateRecyclingRate;
      const recycled = rPoolIncome * recycleRate;
      const importNeeded = rPoolIncome - recycled;
      const importFC = importNeeded / effectiveParams.exchangeRate;
      
      // FX Freeze check
      if (effectiveParams.fgPoolLocked) {
        alerts.push('🧊 FG-Pool FROZEN - Cannot Import!');
        // Cannot import, R-Pool cannot replenish stock
      } else {
        rPoolBank -= importNeeded;
        rPoolStock += importNeeded;
        fgPoolFC -= importFC;
      }
      
      const rPoolExcess = recycled;
      rPoolBank -= rPoolExcess;
      
      // Export
      const exportTargetFC = effectiveParams.dailyImportFC;
      const exportTargetTH = exportTargetFC * effectiveParams.exchangeRate;
      const exportProducedTH = exportTargetTH * effectiveParams.exportEfficiency;
      fgPoolTH += exportProducedTH;
      
      const convertedTH = Math.min(fgPoolTH, exportProducedTH);
      const convertedFC = convertedTH / effectiveParams.exchangeRate;
      fgPoolTH -= convertedTH;
      fgPoolFC += convertedFC;
      
      const exportAchieved = convertedFC;
      const exportTarget = exportTargetFC;
      
      // D-Pool Return
      const dPoolReturn = citizenReturn + b2cToDPool + b2bToDPool + serviceToDPool + rPoolExcess;
      dPool += dPoolReturn;
      
      // G-Pool Emergency
      const fgPoolRunway = fgPoolFC / effectiveParams.dailyImportFC;
      if (fgPoolRunway < effectiveParams.gPoolReleaseThreshold && gPool > 0) {
        const releaseAmount = Math.min(gPool * effectiveParams.gPoolReleaseMax, effectiveParams.dailyImportFC * 14 * effectiveParams.exchangeRate);
        gPool -= releaseAmount;
        dPool += releaseAmount;
        alerts.push(`🔴 G-Pool Emergency: TH ${releaseAmount.toLocaleString()}`);
      }
      
      // Alerts
      if (fgPoolFC < 0) alerts.push('❌ FG-Pool NEGATIVE - SYSTEM COLLAPSED!');
      else if (fgPoolRunway < 7) alerts.push('🔴 FG-Pool < 7 days!');
      else if (fgPoolRunway < 30) alerts.push('🟡 FG-Pool < 30 days');
      
      if (exportAchieved < exportTarget * 0.7) alerts.push('🔴 Export < 70%!');
      else if (exportAchieved < exportTarget * 0.85) alerts.push('🟡 Export < 85%');
      
      // Record Result
      results.push({
        day,
        phase: currentPhaseKey,
        dPool, rPoolBank, rPoolStock, fgPoolTH, fgPoolFC, gPool,
        rPoolTotal: rPoolBank + rPoolStock,
        totalTH: dPool + rPoolBank + rPoolStock + fgPoolTH + gPool,
        dPoolIssue: dailyIssue, 
        dPoolReturn, 
        dPoolNet: dPool - dayStart.dPool,
        rPoolIncome, 
        rPoolImport: importNeeded, 
        rPoolExcess,
        fgPoolImport: importFC, 
        fgPoolExport: exportAchieved, 
        fgPoolExportTH: exportProducedTH,
        fgPoolNet: exportAchieved - importFC,
        exportAchieved, exportTarget,
        exportRate: (exportAchieved / exportTarget * 100).toFixed(1),
        alerts,
        fgPoolRunway,
        activityRate: dayActivityRate,
        exportPop: dayExportPop,
        swanActive,
        swanDay: swanActive ? daysIntoSwan + 1 : null,
      });

      if (fgPoolFC < 0) {

        for (let d = day + 1; d <= params.simulationDays; d++) {

            day: d,

            activityRate: 0,
            exportPop: 0,
            swanActive: false,
            collapsed: true,
          });
        }

    }

    const calculateIndicators = () => {
      if (!currentResult) return null;
      
      const exportPop = currentResult.exportPop || computed.exportPop;
      const nonExportPop = params.population - exportPop;
      
      // ===== CORE VITALITY (系統心跳) =====
      // TSI (Temporal Stability Index): System stability over time
      const alir = currentResult.dPoolReturn / (currentResult.dPoolIssue || 1);
      const rbi = currentResult.fgPoolRunway || 0;
      const tsi = Math.min(100, 50 + ((alir || 0) * 30) + (Math.min(rbi, 60) / 60 * 20));
      
      // CHI (Circulation Health Index): How well TH circulates
      const chi = Math.min(1, (currentResult.rPoolIncome || 0) / (currentResult.dPoolIssue || 1) * 1.2);
      
      // ALIR (Allocation-Liquidity Integrity Ratio)
      // Already calculated above
      
      // ===== RESOURCE SECURITY (生存底線) =====
      // RBI (Reserve Buffer Index): FG-Pool runway in days
      // Already calculated above
      
      // PRE (Production-Resource Efficiency): Export + Recycle vs Import
      const pre = (currentResult.fgPoolExport + (currentResult.rPoolExcess || 0)) / 
                  (currentResult.fgPoolImport || 1);
      
      // GSR (G-Pool Safety Ratio): Emergency reserve level
      const gsr = currentResult.gPool / (params.gPoolInitial || 1);
      
      // ===== EQUITY & HARMONY (社會品質) =====
      // MSC (Maslow Satisfaction Composite): Simplified proxy
      const msc = Math.min(1, 0.3 + (alir * 0.3) + (Math.min(rbi, 90) / 90 * 0.4));
      
      // EQI (Equity Index): Export pressure fairness
      const exportPressure = (params.dailyImportFC / (exportPop || 1));
      const eqi = Math.max(0, 1 - (exportPressure / 55)); // 55 FC/day is max sustainable
      
      // FFI (Freedom-Fulfillment Index): Non-export population ratio
      const ffi = nonExportPop / params.population;
      
      // ===== SYSTEMIC RESILIENCE (抗壓能力) =====
      // CRI (Crisis Response Index): How fast can system recover
      const cri = Math.min(1, (rbi / 60) * 0.5 + gsr * 0.5);
      
      // SDI (System Diversity Index): Not fully calculable, use proxy
      const sdi = 0.5; // Placeholder - needs more data
      
      // VaR (Value at Risk): Worst case scenario days
      const var_days = rbi * 0.7; // 70% of runway under stress
      
      return {
        // Core Vitality
        tsi: { value: tsi, confidence: 0.70, label: 'Proxy', category: 'Core Vitality', icon: '🫀' },
        chi: { value: chi, confidence: 0.70, label: 'Proxy', category: 'Core Vitality', icon: '🔄' },
        alir: { value: alir || 0, confidence: 0.95, label: 'Direct', category: 'Core Vitality', icon: '⚖️' },
        
        // Resource Security
        rbi: { value: rbi, confidence: 0.95, label: 'Direct', category: 'Resource Security', icon: '🛡️' },
        pre: { value: pre || 0, confidence: 0.95, label: 'Direct', category: 'Resource Security', icon: '♻️' },
        gsr: { value: gsr, confidence: 0.95, label: 'Direct', category: 'Resource Security', icon: '🏦' },
        
        // Equity & Harmony
        msc: { value: msc, confidence: 0.50, label: 'Proxy', category: 'Equity & Harmony', icon: '🎯' },
        eqi: { value: eqi, confidence: 0.85, label: 'Calculated', category: 'Equity & Harmony', icon: '⚖️' },
        ffi: { value: ffi, confidence: 0.95, label: 'Direct', category: 'Equity & Harmony', icon: '🕊️' },
        
        // Systemic Resilience
        cri: { value: cri, confidence: 0.70, label: 'Proxy', category: 'Systemic Resilience', icon: '🚨' },
        sdi: { value: sdi, confidence: 0.30, label: 'Placeholder', category: 'Systemic Resilience', icon: '🌈' },
        var: { value: var_days, confidence: 0.60, label: 'Simulated', category: 'Systemic Resilience', icon: '📉' },
        
        // Export Pressure (extra metric)
        exportPressure: { value: exportPressure, confidence: 0.85, label: 'Calculated', category: 'Extra', icon: '💪' },

      const thresholds = {
        // Core Vitality
        tsi: { excellent: 85, healthy: 70, warning: 50 },
        chi: { excellent: 0.85, healthy: 0.70, warning: 0.50 },
        alir: { excellent: [0.95, 1.05], healthy: [0.85, 1.15], warning: [0.70, 1.30] },

        pre: { excellent: 1.10, healthy: 1.00, warning: 0.90 },
        gsr: { excellent: 0.90, healthy: 0.70, warning: 0.50 },

        sdi: { excellent: 0.80, healthy: 0.60, warning: 0.40 },
        var: { excellent: 60, healthy: 30, warning: 14 },
      };
      
      const t = thresholds[indicator];
      if (!t) return 'UNKNOWN';
      
      if (indicator === 'alir') {
        if (value >= t.excellent[0] && value <= t.excellent[1]) return 'EXCELLENT';
        if (value >= t.healthy[0] && value <= t.healthy[1]) return 'HEALTHY';
        if (value >= t.warning[0] && value <= t.warning[1]) return 'WARNING';

    // v3.4: Calculate RSI for Swan mode
    const calculateRSI = () => {
